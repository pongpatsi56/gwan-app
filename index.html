  <body>
    <!-- Auth Bar -->
    <div id="authBar" style="
      position: sticky; top: 0; z-index: 100;
      background: #1a1a2e; color: #eee;
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 16px; font-size: 14px; gap: 8px;
    ">
      <span id="authStatus">⏳ กำลังเชื่อมต่อ...</span>
      <div style="display:flex; gap:6px;">
        <button id="btnLogin" onclick="loginWithGoogle()" style="
          background:#4285f4; color:#fff; border:none;
          padding:5px 12px; border-radius:4px; cursor:pointer; font-size:13px;
        ">🔑 เข้าสู่ระบบ (Creator)</button>
        <button id="btnLogout" onclick="logout()" style="
          display:none; background:#555; color:#fff; border:none;
          padding:5px 12px; border-radius:4px; cursor:pointer; font-size:13px;
        ">ออกจากระบบ</button>
      </div>
    </div>

    <div class="container">
      <h1>🏸 จัดก๊วนแบดมินตัน</h1>

      <!-- ผู้เล่นประจำ -->
      <div class="section">
        <h2>✅ เช็คชื่อผู้เล่นประจำ</h2>
        <div id="fixedPlayersList"></div>
        <button onclick="confirmFixedPlayers()">✔️ ยืนยันผู้เล่นที่มา</button>
        <button
          id="btnToggleSelectAll"
          onclick="toggleSelectAllFixedPlayers()"
          style="background-color: #d4f7d4; color: #065f0a"
        >
          ☑️ เลือกทั้งหมด
        </button>
      </div>

      <!-- แบบฟอร์มเพิ่มผู้เล่น -->
      <div class="section">
        <h2>➕ เพิ่มผู้เล่น</h2>
        <input type="text" id="playerName" placeholder="ชื่อผู้เล่น" />

        <input
          type="radio"
          id="male"
          name="playerGender"
          value="male"
          checked="checked"
        />
        <label for="male">ชาย</label>
        <input type="radio" id="female" name="playerGender" value="female" />
        <label for="female">หญิง</label>

        <button
          style="margin-left: 10px; background-color: green"
          onclick="addPlayer()"
        >
          ✚ เพิ่ม
        </button>
      </div>

      <!-- รายชื่อผู้เล่น -->
      <div class="section">
        <h2>
          👥 รายชื่อผู้เล่น
          <button onclick="shufflePlayers()">🔀 สุ่มผู้เล่น</button>
        </h2>
        <ul id="playerList"></ul>
      </div>

      <!-- คู่ที่กำลังเล่น -->
      <div class="section">
        <h2>🏆 เกมปัจจุบัน</h2>
        <table id="currentMatch" class="table scroll-table"></table>
        <div id="winnerButtons" class="button-group"></div>
      </div>

      <!-- สรุปการเล่น -->
      <div class="section">
        <h2>📊 จำนวนเกมที่เล่น</h2>
        <table id="gameSummary" class="table scroll-table"></table>
      </div>

      <!-- ประวัติการแข่งขัน -->
      <div class="section">
        <h3>📜 ประวัติการแข่งขัน</h3>
        <table id="matchHistory" class="table scroll-table"></table>
      </div>

      <!-- ปุ่มล้างข้อมูล -->
      <div class="section">
        <button class="danger" onclick="resetAll()">
          🔄 ล้างข้อมูลทั้งหมด
        </button>
        <button id="btnStartGame" onclick="renderGame()">🎯 เริ่มเกม</button>
      </div>
